# Configuração para deploy no Railway.app
# Usa Nixpacks para detectar e construir o app Python

[phases.setup]
nixPkgs = ["chromium", "libxcomposite", "libxdamage", "libxrandr", "libxfixes", "libxext", "libxcb", "libxkbcommon", "libdrm", "cairo", "pango", "libglvnd"]
cmds = ["apt-get update -y && apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libgtk-3-0"]

[phases.install]
cmds = ["pip install -r requirements.txt", "python -m playwright install chromium", "python -m playwright install-deps chromium"]

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600"